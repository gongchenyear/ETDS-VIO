%YAML:1.0
---
# VCU-RVI Benchmark — Ours-Full (DF + DRT initialization fallback).
# Complete system used to validate cross-sensor robustness on lab-dynamic
# sequences. Mirrors openloris/market_mono_imu_ours_full.yaml.

#common parameters
imu: 1
num_of_cam: 1

# Topics from VCU-RVI lab-dynamic rosbags.
imu_topic: "/imu"
image0_topic: "/cam0/color"
depth0_topic: "/cam0/depth"

output_path: "/home/chen/full+drt/Ours-Full/"

# Camera calibration.
cam0_calib: "sc_color_calib.yaml"
image_width: 640
image_height: 480

# Extrinsic IMU<->camera from Occipital SDK factory calibration.
estimate_extrinsic: 0
body_T_cam0: !!opencv-matrix # Timu2c_1 Tu2c
   rows: 4
   cols: 4
   dt: d
   data: [ 0.00193013, -0.999997,    0.00115338, -0.00817048,
          -0.999996,   -0.0019327,  -0.00223606,  0.015075,
           0.00223829, -0.00114906, -0.999997,   -0.0110795,
           0.0,         0.0,         0.0,         1.0 ]

#Multiple thread support
multiple_thread: 1

#feature tracker parameters
max_cnt: 200
min_dist: 25
freq: 10
F_threshold: 1.0
show_track: 1
flow_back: 1
flow_back_threshold: 0.5

#optimization parameters
max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 3.0

initialization:
    relative_pose_min_parallax_px: 3.0
    max_vins_init_failures: 8

#imu parameters (rising-turtle VCU-RVI calibration).
# IMU noise — kept identical to rising-turtle/VINS-Fusion struct_core_cal_v2.
acc_n: 0.2
gyr_n: 0.02
acc_w: 0.002
gyr_w: 0.0002
g_norm: 9.8
imu_acc_scale: -9.80665  # VCU-RVI /imu is normalized (acc/9.8); rescale with sign flip (rising-turtle Issue #8)

# DRT prior covariance.
drt_prior:
    pos_cov: 0.4
    rot_cov: 0.09
    vel_cov: 1.0
    acc_bias_cov: 0.5
    gyr_bias_cov: 0.1

#unsynchronization parameters
estimate_td: 1
td: 0.0

#loop closure parameters
load_previous_pose_graph: 0
pose_graph_save_path: "/home/chen/full+drt/Ours-Full/vcu_rvi/pose_graph/"
save_image: 1

# Dynamic Scene Detection Trigger.
dynamic_trigger:
    enabled: 1
    tracking_rate_threshold: 0.91
    k_on_frames: 2
    k_off_frames: 10

# Module Control — full system: DF + DRT fallback.
module_control:
    enable_dg_ransac: 1
    enable_pre_filtering: 1
    enable_post_verification: 1
    enable_drt_fallback: 1

# Depth Confidence Computation — see ours_nodrt for sigma_0 sensor calibration note.
depth_confidence:
    sigma_relative: 0.12
    sigma_rate: 2.0
    lambda_depth: 0.005
    lambda_fov: 0.15
    min_threshold: 0.2
    high_threshold: 0.30
    filter_size: 5

post_verification:
    enabled: 1
    suspicious_threshold: 0.65
    max_verify_count: 20

depth_verification:
    depth_min_range: 0.3
    depth_max_range: 6.0
    min_depth_samples: 2
    depth_rate_tolerance_sigma: 3.0
    depth_noise_std: 0.02

dg_ransac:
    enabled: 1
    local_window_size: 15
    filter_kernel: 7
    high_conf_filter_threshold: 0.30
    min_points_for_ransac: 8
    fallback_enabled: 1
    epipolar_threshold: 1.5
    depth_error_threshold: 0.30
    min_iterations: 50
    max_iterations: 300
    adaptive_iterations: 1
    early_termination_ratio: 0.8

logging:
    enable_detailed_log: 1
    log_interval: 100
    log_trigger_events: 1
    log_statistics: 1
    log_performance: 1
    log_depth_preprocess: 1
    log_confidence_compute: 1
    log_ransac_details: 1
    log_depth_motion: 1
